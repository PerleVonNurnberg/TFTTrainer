<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TFT Trainer — Set 17</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="champions.css">
  <style>
    .landing-cards {
      display: flex;
      gap: 20px;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 12px;
    }

    .landing-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 36px 32px;
      width: 280px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      text-decoration: none;
      color: var(--text);
      transition: border-color 0.18s, background 0.18s, transform 0.15s;
      cursor: pointer;
    }

    .landing-card:hover {
      border-color: var(--gold);
      background: var(--surface2);
      transform: translateY(-3px);
    }

    .landing-card-title {
      font-size: 1.15rem;
      font-weight: 700;
      color: var(--gold-light);
      letter-spacing: 0.5px;
    }

    .landing-card-modes {
      display: flex;
      flex-direction: column;
      gap: 5px;
      width: 100%;
    }

    .landing-mode {
      font-size: 0.78rem;
      color: var(--text-muted);
      padding: 5px 10px;
      background: var(--surface2);
      border-radius: 5px;
      text-align: center;
    }

    .landing-card:hover .landing-mode {
      background: var(--surface3);
    }

    .landing-card-cta {
      margin-top: 8px;
      background: var(--gold);
      color: #080C18;
      border-radius: 6px;
      padding: 8px 24px;
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 0.3px;
    }
  </style>
</head>
<body>
  <header>
    <h1>TFT Trainer</h1>
    <p class="subtitle">Set 17 · Space Gods</p>
  </header>

  <main style="display:flex; justify-content:center;">
    <div class="landing-cards">

      <a href="items.html" class="landing-card">
        <div class="landing-card-title">Item Trainer</div>
        <div class="landing-card-modes">
          <div class="landing-mode">Item → Components</div>
          <div class="landing-mode">Components → Item</div>
        </div>
        <div class="landing-card-cta">Play →</div>
      </a>

      <a href="champions.html" class="landing-card">
        <div class="landing-card-title">Champion Trainer</div>
        <div class="landing-card-modes">
          <div class="landing-mode">Portrait → Name</div>
          <div class="landing-mode">Champion → Traits</div>
          <div class="landing-mode">Ability → Champion</div>
          <div class="landing-mode">Champion → Ability</div>
        </div>
        <div class="landing-card-cta">Play →</div>
      </a>

    </div>
  </main>
</body>
</html>
